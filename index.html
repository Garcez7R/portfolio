<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rafael Garcez | Cloud, Security & Infrastructure Portfolio</title>
    <meta
      name="description"
      content="Professional portfolio highlighting certifications, skills, projects, and technical documents."
    />
    <meta property="og:title" content="Rafael Garcez | Tech Portfolio" />
    <meta
      property="og:description"
      content="Professional portfolio highlighting certifications, skills, projects, and technical documents."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rafael Garcez" />
    <meta property="og:url" content="https://Garcez7R.github.io/portfolio/" />
    <meta property="og:image" content="https://Garcez7R.github.io/portfolio/assets/img/og-cover.svg" />
    <meta property="og:image:alt" content="Rafael Garcez portfolio cover" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rafael Garcez | Tech Portfolio" />
    <meta
      name="twitter:description"
      content="Professional portfolio highlighting certifications, skills, projects, and technical documents."
    />
    <meta name="twitter:image" content="https://Garcez7R.github.io/portfolio/assets/img/og-cover.svg" />
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260406-vault-category-fix" />
  </head>
  <body>
    <div class="telemetry-band" aria-hidden="true">
      <span>LIVE</span>
      <span>SECURE</span>
      <span>CLOUD</span>
      <span>IAM</span>
    </div>

    <!-- Splash screen shown only once per browser session. -->
    <div class="splash" id="splash" aria-hidden="true">
      <div class="splash__bar"></div>
      <div class="splash__terminal">
        <p>[SYSTEM] Initializing modules...</p>
        <p>[OK] Cloud credentials loaded.</p>
        <p>[READY] Launching portfolio...</p>
      </div>
    </div>

    <!-- Sticky navigation with language switcher. -->
    <header class="topbar">
      <a class="brand" href="#hero">Rafael Garcez</a>
      <nav class="topnav" aria-label="Primary">
        <a href="#skills" data-i18n="nav.skills"></a>
        <a href="#credentials" data-i18n="nav.credentials"></a>
        <a href="#vault" data-i18n="nav.vault"></a>
        <a href="#projects" data-i18n="nav.projects"></a>
        <a href="#community" data-i18n="nav.community"></a>
        <a href="#contact" data-i18n="nav.contact"></a>
      </nav>
      <div class="sidebar-fill" aria-label="Secondary portfolio controls">
        <div class="sidebar-fill__panel sidebar-fill__panel--system">
          <span class="sidebar-fill__caption">SYSTEM</span>
          <a class="sidebar-fill__cv" id="sidebar-cv-link" href="./assets/docs/cv.pdf" target="_blank" rel="noreferrer">
            <span>CV</span>
            <strong data-i18n="sidebar.cv"></strong>
          </a>
        </div>
        <div class="sidebar-fill__panel sidebar-fill__panel--status">
          <span class="sidebar-fill__caption" data-i18n="sidebar.statusTitle"></span>
          <div class="sidebar-fill__rows">
            <div class="sidebar-fill__row">
              <span data-i18n="sidebar.focusLabel"></span>
              <strong data-i18n="sidebar.focusValue"></strong>
            </div>
            <div class="sidebar-fill__row">
              <span data-i18n="sidebar.locationLabel"></span>
              <strong data-i18n="sidebar.locationValue"></strong>
            </div>
            <div class="sidebar-fill__row">
              <span data-i18n="sidebar.availabilityLabel"></span>
              <strong data-i18n="sidebar.availabilityValue"></strong>
            </div>
          </div>
        </div>
      </div>
      <div class="lang-switch" aria-label="Language switcher">
        <button type="button" data-lang-btn="pt"><span class="flag flag--br" aria-hidden="true"></span> PT</button>
        <span>|</span>
        <button type="button" data-lang-btn="en">EN <span class="flag flag--us" aria-hidden="true"></span></button>
      </div>
    </header>

    <main class="bento-main">
      <!-- Hero section with profile, headline and technical summary. -->
      <section class="hero section section--hero bento-span-8 fade-in" id="hero">
        <div class="hero__shell">
          <div class="hero__content">
            <div class="hero__globe" aria-hidden="true"></div>
            <p class="eyebrow" data-i18n="hero.eyebrow"></p>
            <div class="hero__ticker" aria-hidden="true">
              <div class="hero__ticker-track" id="hero-ticker-track"></div>
            </div>
            <h1 data-i18n="hero.name"></h1>
            <p class="hero__title" data-i18n="hero.title"></p>
            <p class="hero__description" data-i18n="hero.description"></p>
            <div class="hero__cta-row">
              <a class="button button--primary" href="#contact" data-i18n="hero.cta"></a>
              <span class="hero__badge" data-i18n="hero.openBadge"></span>
            </div>
            <div class="hero__banner">
              <span data-i18n="hero.banner1"></span>
              <span data-i18n="hero.banner2"></span>
              <span data-i18n="hero.banner3"></span>
            </div>
            <div class="hero__actions">
              <a class="button button--primary button--icon" href="https://github.com/Garcez7R" target="_blank" rel="noreferrer">
                <span class="button__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-1.03-.01-1.87-2.78.62-3.37-1.21-3.37-1.21-.45-1.2-1.11-1.52-1.11-1.52-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.56 2.36 1.11 2.94.85.09-.67.35-1.11.64-1.36-2.22-.26-4.55-1.14-4.55-5.08 0-1.12.39-2.03 1.03-2.74-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.31 9.31 0 0 1 12 6.84c.85 0 1.71.12 2.51.36 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.46.1 2.72.64.71 1.03 1.62 1.03 2.74 0 3.95-2.33 4.81-4.56 5.07.36.31.68.91.68 1.84 0 1.33-.01 2.4-.01 2.73 0 .27.18.6.69.49A10.27 10.27 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z" fill="currentColor"/>
                  </svg>
                </span>
                GitHub
              </a>
              <a class="button button--icon" href="https://www.linkedin.com/in/rgarcez7/" target="_blank" rel="noreferrer">
                <span class="button__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M6.94 8.5H3.56V20h3.38V8.5Zm.22-3.55c0-1.01-.74-1.8-1.9-1.8-1.15 0-1.9.79-1.9 1.8 0 .99.73 1.8 1.86 1.8h.02c1.18 0 1.92-.81 1.92-1.8ZM20.44 13.14C20.44 9.62 18.6 8 16.15 8c-1.97 0-2.85 1.12-3.35 1.9V8.5H9.42c.04.92 0 11.5 0 11.5h3.38v-6.42c0-.34.02-.68.12-.93.27-.68.88-1.38 1.91-1.38 1.35 0 1.89 1.05 1.89 2.58V20h3.38v-6.86Z" fill="currentColor"/>
                  </svg>
                </span>
                LinkedIn
              </a>
            </div>
          </div>
          <aside class="hero__visual" aria-label="Technical summary">
            <div class="hero__profile-stage">
              <div class="hero__signal">
                <span data-i18n="hero.panelTag"></span>
                <strong data-i18n="hero.panelTitle"></strong>
              </div>
              <div class="hero__profile-frame">
                <img src="./assets/img/profile.jpeg?v=20260330-profile" alt="Portrait of Rafael Garcez" />
              </div>
            </div>
            <div class="hero__summary">
              <div class="hero__pillars" id="hero-pillars"></div>
              <div class="hero__terminal">
                <p data-i18n="hero.panelLine1"></p>
                <p data-i18n="hero.panelLine2"></p>
                <p data-i18n="hero.panelLine3"></p>
              </div>
            </div>
          </aside>
        </div>
      </section>

      <!-- Domain-based skills with tooltip-ready skill chips. -->
      <section class="section section--skills bento-span-5 fade-in" id="skills">
        <div class="section-shell section-shell--skills" data-section="01">
          <div class="section__intro section__intro--compact">
            <p class="eyebrow" data-i18n="skills.eyebrow"></p>
            <h2 data-i18n="skills.title"></h2>
            <p data-i18n="skills.description"></p>
          </div>
          <div class="skill-grid" id="skills-grid"></div>
        </div>
      </section>

      <!-- Credentials rendered from badges.md. -->
      <section class="section section--credentials bento-span-3 fade-in" id="credentials">
        <div class="section-shell section-shell--credentials" data-section="02">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="credentials.eyebrow"></p>
            <h2 data-i18n="credentials.title"></h2>
            <p data-i18n="credentials.description"></p>
          </div>
          <div class="credentials-stage">
            <div class="credentials-core">
              <div class="credentials-core__intro">
                <span class="credentials-core__eyebrow" data-i18n="credentials.coreTitle"></span>
                <p data-i18n="credentials.coreDescription"></p>
              </div>
              <div class="credentials-core__grid" id="core-badge-grid"></div>
            </div>
            <div class="credentials-more" id="credentials-more">
              <p class="credentials-more__prompt" data-i18n="credentials.morePrompt"></p>
              <div class="credentials-more__content" id="credentials-more-content" hidden>
                <div class="filters" id="badge-filters" aria-label="Certification filters"></div>
                <div class="badge-grid" id="badge-grid"></div>
              </div>
              <div class="credentials__actions">
                <button class="button button--ghost" id="badge-toggle" type="button"></button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- PDF vault for verification links. -->
      <section class="section section--vault bento-span-3 fade-in" id="vault">
        <div class="section-shell section-shell--vault" data-section="03">
          <div class="section-heading section-heading--vault">
            <p class="eyebrow" data-i18n="vault.eyebrow"></p>
            <h2 data-i18n="vault.title"></h2>
            <p data-i18n="vault.description"></p>
          </div>
          <div class="vault-stage">
            <div class="vault-controls">
              <label class="vault-search">
                <span data-i18n="vault.searchLabel"></span>
                <input id="vault-search" type="search" />
              </label>
            </div>
            <div class="vault-featured" id="vault-featured"></div>
            <div class="vault-more">
              <p class="credentials-more__prompt vault-more__prompt" id="vault-more-prompt" data-i18n="vault.morePrompt"></p>
              <div class="vault-more__content" id="vault-more-content" hidden>
                <div class="vault-groups" id="vault-groups"></div>
              </div>
              <div class="credentials__actions">
                <button class="button button--ghost" id="vault-toggle" type="button"></button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Selected projects and labs. -->
      <section class="section section--projects bento-span-5 fade-in" id="projects">
        <div class="section-shell section-shell--projects" data-section="04">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="projects.eyebrow"></p>
            <h2 data-i18n="projects.title"></h2>
            <p data-i18n="projects.description"></p>
          </div>
          <div class="project-grid" id="project-grid"></div>
        </div>
      </section>

      <!-- Community and mentoring track record. -->
      <section class="section section--community bento-span-3 fade-in" id="community">
        <div class="section-shell section-shell--community" data-section="05">
          <div class="section-heading community-heading">
            <p class="eyebrow" data-i18n="community.eyebrow"></p>
            <h2 data-i18n="community.title"></h2>
            <p data-i18n="community.description"></p>
          </div>
          <div class="project-grid community-grid" id="community-grid"></div>
        </div>
      </section>

      <!-- Lightweight metrics for quick technical scanning. -->
      <section class="section section--metrics bento-span-3 fade-in" id="metrics">
        <div class="insight-shell" data-section="06">
          <div class="section__intro section__intro--compact">
            <p class="eyebrow" data-i18n="metrics.eyebrow"></p>
            <h2 data-i18n="metrics.title"></h2>
            <p data-i18n="metrics.description"></p>
          </div>
          <div class="metrics-grid">
            <article class="metric-card">
              <h3 data-i18n="metrics.certificationsChart"></h3>
              <div id="cert-metrics" class="metric-chart"></div>
              <p class="metric-note" id="cert-metrics-note"></p>
            </article>
            <article class="metric-card">
              <h3 data-i18n="metrics.skillsChart"></h3>
              <div id="skills-metrics" class="metric-chart"></div>
            </article>
          </div>
        </div>
      </section>

      <!-- Contact endpoints and resume access. -->
      <section class="section section--contact bento-span-5 fade-in" id="contact">
        <div class="contact-shell" data-section="07">
          <div class="section__intro section__intro--compact">
            <p class="eyebrow" data-i18n="contact.eyebrow"></p>
            <h2 data-i18n="contact.title"></h2>
            <p data-i18n="contact.description"></p>
          </div>
          <div class="contact-grid" id="contact-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p data-i18n="footer.copy"></p>
    </footer>

    <script type="module" src="./assets/js/main.js?v=20260406-cert-preview-removed"></script>
  </body>
</html>
